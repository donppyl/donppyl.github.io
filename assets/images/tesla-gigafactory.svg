<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Tesla Gigafactory Illustration</title>
  <desc id="desc">Stylized industrial factory scene with Tesla branding accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#e8ecf3"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="110" y="340" width="1380" height="380" rx="18" fill="#d9dee8"/>
  <rect x="160" y="390" width="1280" height="280" rx="8" fill="#f4f6fa" stroke="#bac3d1"/>
  <g fill="#b4bdcb">
    <rect x="220" y="430" width="130" height="210" rx="4"/>
    <rect x="390" y="430" width="130" height="210" rx="4"/>
    <rect x="560" y="430" width="130" height="210" rx="4"/>
    <rect x="730" y="430" width="130" height="210" rx="4"/>
    <rect x="900" y="430" width="130" height="210" rx="4"/>
    <rect x="1070" y="430" width="130" height="210" rx="4"/>
    <rect x="1240" y="430" width="130" height="210" rx="4"/>
  </g>
  <rect x="620" y="260" width="360" height="90" rx="10" fill="#11131a"/>
  <text x="800" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" fill="#e82127" letter-spacing="6">TESLA</text>
  <rect x="0" y="780" width="1600" height="220" fill="#cfd6e2"/>
  <g stroke="#9ba8bc" stroke-width="6">
    <line x1="0" y1="820" x2="1600" y2="820"/>
    <line x1="0" y1="880" x2="1600" y2="880"/>
  </g>
</svg>
